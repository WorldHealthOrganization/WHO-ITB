# Example override file for adding plugins.
# Copy this to docker-compose.override.yml and uncomment the services you need.
# Or use a recipe from https://github.com/HealthOpenSpace/itb-plugins/tree/main/recipes
#
# Usage:
#   cp docker-compose.override.yml.example docker-compose.override.yml
#   # edit to enable services
#   docker compose up -d

services: 

  fhir-validator:
    image: eclipse-temurin:17-jre
    container_name: fhir-validator
    restart: unless-stopped
    working_dir: /app
    volumes:
      # Jar is downloaded once on first boot into this named volume and cached
      # across restarts — no host validator_cli.jar / bind mount, so the
      # "Docker fabricates an empty dir → Invalid or corrupt jarfile" trap
      # cannot happen. Pattern mirrors itb-ecosystem's fhir-validator plugin.
      - fhir-validator-cache:/app
    ports:
      - "8088:8080"
    environment:
      # MEOW + transitive deps (hl7.terminology.r5, etc.) can push past 4G;
      # extra headroom for validation runs.
      - JAVA_TOOL_OPTIONS=-Xmx8g
      # Override to pin a specific validator build.
      - VALIDATOR_URL=${VALIDATOR_URL:-https://github.com/costateixeira/org.hl7.fhir.core/releases/download/wip/validator_cli.jar}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        JAR=/app/validator_cli.jar
        if [ ! -s "$$JAR" ]; then
          echo "Downloading validator jar from $$VALIDATOR_URL"
          apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates
          curl -fSL --retry 3 -o "$$JAR" "$$VALIDATOR_URL"
        fi
        exec java -jar "$$JAR" server 8080 -version 4.0 -allowNetworkAccess
    healthcheck:
      # Java/TCP-only check — works on first boot before curl is installed.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET / HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q HTTP"]
      interval: 30s
      timeout: 10s
      retries: 5
      # Cold start = apt install + ~180MB download + JVM warmup.
      start_period: 300s

  hcert-validator:
    # TODO: switch back to costateixeira/gdhcn-validator:<tag> once a build newer
    # than 0.2.0 (which is missing /verify/signature and other endpoints) is published.
    build:
      context: ./gdhcn-helper
      dockerfile: Dockerfile
    # Rebuild from ./gdhcn-helper on every `up`, so a stale auto-named image
    # is never silently reused when someone forgets `--build`.
    pull_policy: build
    container_name: hcert-validator
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Not needed for ph4h-qr test ──
  # fhir-validator handles IG load, StructureMap transform, and profile
  # validation natively via /itb/{igManager,transform,fhir}/process. The
  # vhl/icvp test suites still need fhir-server + matchbox + smart-helper;
  # see e:/work/WHO-ITB/docker-compose.override.yml for that stack.

volumes:
  fhir-validator-cache:
