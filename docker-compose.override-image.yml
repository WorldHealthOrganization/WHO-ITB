# Example override file for adding plugins.
# Copy this to docker-compose.override.yml and uncomment the services you need.
# Or use a recipe from https://github.com/HealthOpenSpace/itb-plugins/tree/main/recipes
#
# Usage:
#   cp docker-compose.override.yml.example docker-compose.override.yml
#   # edit to enable services
#   docker compose up -d

services: 

  fhir-validator:
    image: costateixeira/fhir-validator:latest
    container_name: fhir-validator
    restart: unless-stopped
    ports:
      - "8088:8081"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx2g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST http://localhost:8081/validateResource -H 'Content-Type: application/fhir+json' -d '{\"resourceType\":\"Patient\"}' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

