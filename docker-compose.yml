volumes:
  gitb-repo:
  gitb-dbdata:

services:
  gitb-redis:
    image: redis:7.2.5
    restart: unless-stopped

  gitb-mysql:
    image: isaitb/gitb-mysql:latest
    restart: unless-stopped
    volumes:
      - gitb-dbdata:/var/lib/mysql
    healthcheck:
      test: "/usr/bin/mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute \"SHOW DATABASES;\""
      interval: 3s
      retries: 10

  gitb-srv:
    image: isaitb/gitb-srv:nightly
    restart: unless-stopped

  gitb-ui:
    image: isaitb/gitb-ui:nightly
    restart: unless-stopped
    ports:
      - "${ITB_PORT:-10003}:9000"
    volumes:
      - gitb-repo:/gitb-repository
    environment:
      - DATA_ARCHIVE_KEY=${DATA_ARCHIVE_KEY:-}
      - AUTOMATION_API_ENABLED=true
      - AUTOMATION_API_MASTER_KEY=${AUTOMATION_API_MASTER_KEY:-master-api-key}
      - THEME=${ITB_THEME:-ec}
    depends_on:
      gitb-redis:
        condition: service_started
      gitb-mysql:
        condition: service_healthy
      gitb-srv:
        condition: service_started
